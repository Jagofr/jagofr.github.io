<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/res/styles/css/main.css">
    <title>Jagofr's Void</title>
</head>
<body id="site-body">
    <!-- Displayed on Desktop by Default -->
     <!-- Hidden on Mobile -->
    <aside id="site-nav">
        <nav id="site-nav-group">
            <ul id="site-nav-list">
                <li class="site-nav-list-item">
                    <a href="#" class="site-nav-list-item-link">Home</a>
                </li>
                <li class="site-nav-list-item">
                    <a href="#" class="site-nav-list-item-link">About</a>
                </li>
                <li class="site-nav-list-item">
                    <a href="#" class="site-nav-list-item-link">Blog</a>
                </li>
                <li class="site-nav-list-item">
                    <a href="#" class="site-nav-list-item-link">Portfolio</a>
                </li>
                <li class="site-nav-list-item">
                    <a href="#" class="site-nav-list-item-link">Contact</a>
                </li>
            </ul>
            <ul id="site-nav-list-socials">
                <li class="site-nav-list-socials-item">
                    <a href="#" class="site-nav-list-socials-item-link">
                        <i class="fab fa-github"></i>
                    </a>
                </li>
                <li class="site-nav-list-socials-item">
                    <a href="#" class="site-nav-list-socials-item-link">
                        <i class="fab fa-linkedin"></i>
                    </a>
                </li>
                <li class="site-nav-list-socials-item">
                    <a href="#" class="site-nav-list-socials-item-link">
                        <i class="fab fa-youtube"></i>
                    </a>
                </li>
                <li class="site-nav-list-socials-item">
                    <a href="#" class="site-nav-list-socials-item-link">
                        <i class="fab fa-medium"></i>
                    </a>
                </li>
                <li class="site-nav-list-socials-item">
                    <a href="#" class="site-nav-list-socials-item-link">
                        <i class="fab fa-instagram"></i>
                    </a>
                </li>
                <li class="site-nav-list-socials-item">
                    <a href="#" class="site-nav-list-socials-item-link">
                        <i class="fab fa-soundcloud"></i>
                    </a>
                </li>
                <li class="site-nav-list-socials-item">
                    <a href="#" class="site-nav-list-socials-item-link">
                        <i class="fab fa-spotify"></i>
                    </a>
                </li>
            </ul>
            <ul id="site-nav-list-misc">
                <li class="site-nav-list-misc-item">
                    <a href="#" class="site-nav-list-misc-link">Site Map</a>
                </li>
                <li class="site-nav-list-misc-item">
                    <a href="#" class="site-nav-list-misc-link">Legal</a>
                </li>
            </ul>
        </nav>

    </aside>
    <!-- Shares space with Nav on Desktop by Default -->
     <!-- Fills entire space on Mobile -->
    <main id="site-main">
        <header id="site-head">
            <!-- Navigation Button hidden on Desktop by Default -->
            <!-- Shown on Mobile -->
            <button id="hamburger-button" title="Navigation Menu">
                <span class="burger-part" id="lettuce"></span>
                <span class="burger-part" id="cheese"></span>
                <span class="burger-part" id="patty"></span>
            </button>
            <div id="site-head-img-container">
                <!-- Scalable Vector Logo -->
                <object data="/res/svg/jagofr-logo.svg" type="image/svg+xml" alt="Jagofr Logo" title="Jagofr's Logo">
                    <!-- Data Efficent Image Fallback -->
                    <img srcset="/res/img/jagofr-logo-sm.webp 480w, /res/img/jagofr-logo-md.webp 768w, /res/img/jagofr-logo-lg.webp 1024w" alt="Jagofr Logo" sizes="(min-width: 768px) 768px, (min-width: 1024px) 1024px">
                </object>
            </div>
        </header>
        <section id="site-content">
            <section id="site-sect-hero">
                <h1>Hi!</h1>
            </section>
            <section id="site-sect-summary"></section>
            <section id="site-sect-experience"></section>
            <section id="site-sect-tech"></section>
            <section id="site-sect-portfolio"></section>
            <section id="site-sect-contact"></section>
        </section>
        <footer id="site-foot">
            <section id="site-foot-copy-sect">
                <p class="copy-text">Copyright &copy; 2024 <br> Gerard "Jagofr" Francis <br> All Rights Reserved</p>
            </section>
        </footer>
    </main>

</html>
